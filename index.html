<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Sistema de Asistencia</title>

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
<script src="https://cdn.jsdelivr.net/npm/chartjs-plugin-datalabels@2"></script>

<style>
:root{
--bg:#f4f6f9;
--card:#ffffff;
--text:#111827;
--primary:#2563eb;
--shadow:0 10px 30px rgba(0,0,0,0.08);
}

body.dark{
--bg:#0f172a;
--card:#1e293b;
--text:#f1f5f9;
--primary:#3b82f6;
--shadow:0 10px 30px rgba(0,0,0,0.4);
}

body{
margin:0;
font-family:Segoe UI, sans-serif;
background:var(--bg);
color:var(--text);
transition:0.3s;
}

header{
display:flex;
justify-content:space-between;
align-items:center;
padding:15px 25px;
background:var(--card);
box-shadow:var(--shadow);
}

button{
padding:10px 15px;
border:none;
border-radius:10px;
cursor:pointer;
font-weight:600;
}

.primary{
background:var(--primary);
color:white;
}

.toggle{
background:transparent;
border:2px solid var(--primary);
color:var(--primary);
}

.container{
max-width:1100px;
margin:40px auto;
padding:20px;
}

.card{
background:var(--card);
padding:25px;
border-radius:20px;
box-shadow:var(--shadow);
margin-bottom:30px;
}

input{
padding:10px;
margin:5px;
border-radius:8px;
border:1px solid #ccc;
}

.kpis{
display:flex;
gap:20px;
flex-wrap:wrap;
margin-bottom:30px;
}

.kpi{
flex:1;
min-width:150px;
text-align:center;
padding:20px;
border-radius:16px;
background:var(--card);
box-shadow:var(--shadow);
transition:0.3s;
}

.kpi:hover{
transform:translateY(-5px);
}

.kpi h2{
margin:0;
font-size:32px;
}

.chart-box{
height:420px;
}

@media(max-width:768px){
.kpis{flex-direction:column;}
}
</style>
</head>

<body>

<header>
<h2>Sistema de Asistencia</h2>
<button class="toggle" onclick="toggleDark()">Modo</button>
</header>

<div class="container">

<div class="card">
<h3>Registrar Asistencia</h3>
<input type="date" id="fecha">
<input type="number" id="virtual" placeholder="Virtual">
<input type="number" id="presencial" placeholder="Presencial">
<button class="primary" onclick="guardar()">Guardar</button>
</div>

<div class="card">
<h3>Login Admin</h3>
<input type="text" id="user" placeholder="Usuario">
<input type="password" id="pass" placeholder="Contraseña">
<button class="primary" onclick="login()">Entrar</button>
</div>

<div id="adminPanel" style="display:none;">

<div class="kpis">
<div class="kpi">
<h2 id="totalKPI">0</h2>
<p>Total</p>
</div>
<div class="kpi">
<h2 id="virtualKPI">0%</h2>
<p>Virtual</p>
</div>
<div class="kpi">
<h2 id="presencialKPI">0%</h2>
<p>Presencial</p>
</div>
</div>

<div class="card chart-box">
<canvas id="grafico"></canvas>
</div>

</div>

</div>

<!-- Firebase -->
<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
import { getFirestore, collection, setDoc, doc, getDocs } 
from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";

const firebaseConfig = {
apiKey: "AIzaSyBs3r8RFztg6NxUbkZmaSag2CxfF7phvG8",
authDomain: "sistema-asistencia-a47c9.firebaseapp.com",
projectId: "sistema-asistencia-a47c9",
storageBucket: "sistema-asistencia-a47c9.appspot.com",
messagingSenderId: "386197839949",
appId: "1:386197839949:web:fa84a03ca12f5c4c20bc04"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

let chart;

window.guardar = async function(){

const fecha=document.getElementById("fecha").value;
if(!fecha){
alert("Selecciona una fecha");
return;
}

const virtual=parseInt(document.getElementById("virtual").value)||0;
const presencial=parseInt(document.getElementById("presencial").value)||0;

await setDoc(doc(db,"asistencia",fecha),{virtual,presencial});

alert("Guardado correctamente");

// Limpiar campos
document.getElementById("fecha").value="";
document.getElementById("virtual").value="";
document.getElementById("presencial").value="";
};

window.login = async function(){

const usuario=document.getElementById("user").value;
const contraseña=document.getElementById("pass").value;

if(usuario==="Landia" && contraseña==="Lapina1115"){
document.getElementById("adminPanel").style.display="block";
await cargarGrafico();
}else{
alert("Credenciales incorrectas");
}
};

async function cargarGrafico(){

const snapshot=await getDocs(collection(db,"asistencia"));

let totalVirtual=0;
let totalPresencial=0;

snapshot.forEach(doc=>{
const data=doc.data();
totalVirtual+=data.virtual;
totalPresencial+=data.presencial;
});

const total=totalVirtual+totalPresencial;

const pVirtual= total?((totalVirtual/total)*100).toFixed(1):0;
const pPresencial= total?((totalPresencial/total)*100).toFixed(1):0;

document.getElementById("totalKPI").innerText=total;
document.getElementById("virtualKPI").innerText=pVirtual+"%";
document.getElementById("presencialKPI").innerText=pPresencial+"%";

if(chart) chart.destroy();

const ctx=document.getElementById("grafico").getContext("2d");

const grad1=ctx.createLinearGradient(0,0,0,400);
grad1.addColorStop(0,"#3b82f6");
grad1.addColorStop(1,"#1e3a8a");

const grad2=ctx.createLinearGradient(0,0,0,400);
grad2.addColorStop(0,"#22c55e");
grad2.addColorStop(1,"#14532d");

chart=new Chart(ctx,{
type:"bar",
data:{
labels:["Virtual","Presencial"],
datasets:[{
data:[totalVirtual,totalPresencial],
backgroundColor:[grad1,grad2],
borderRadius:20,
barThickness:90
}]
},
options:{
responsive:true,
maintainAspectRatio:false,
animation:{
duration:1600,
easing:"easeOutQuart"
},
plugins:{
legend:{display:false},
tooltip:{
callbacks:{
label:(context)=>{
const value=context.raw;
const percent=context.dataIndex===0?pVirtual:pPresencial;
return value+" ("+percent+"%)";
}
}
},
datalabels:{
anchor:"end",
align:"top",
formatter:(value,context)=>{
return context.dataIndex===0?pVirtual+"%":pPresencial+"%";
},
font:{weight:"bold",size:18}
}
},
scales:{
y:{
beginAtZero:true,
grid:{color:"rgba(0,0,0,0.05)"}
}
}
},
plugins:[ChartDataLabels]
});
}
</script>

<script>
function toggleDark(){
document.body.classList.toggle("dark");
}
</script>

</body>
</html>
