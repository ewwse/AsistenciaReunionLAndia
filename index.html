<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Sistema de Asistencia</title>
<link rel="icon" type="image/png" href="icon.png">
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
<script src="https://cdn.jsdelivr.net/npm/chartjs-plugin-datalabels@2"></script>

<style>
:root{
--bg:#f4f6f9;
--card:#ffffff;
--text:#111827;
--primary:#2563eb;
--shadow:0 10px 30px rgba(0,0,0,0.08);
}

body.dark{
--bg:#0f172a;
--card:#1e293b;
--text:#f1f5f9;
--primary:#3b82f6;
--shadow:0 10px 30px rgba(0,0,0,0.4);
}

body{
margin:0;
font-family:Segoe UI, sans-serif;
background:var(--bg);
color:var(--text);
transition:background .4s ease,color .4s ease;
}

header{
display:flex;
justify-content:space-between;
align-items:center;
padding:15px 25px;
background:var(--card);
box-shadow:var(--shadow);
}

button{
padding:10px 15px;
border:none;
border-radius:10px;
cursor:pointer;
font-weight:600;
transition:.3s;
}

button:hover{
transform:translateY(-3px);
}

.primary{
background:var(--primary);
color:white;
}

.danger{
background:#ef4444;
color:white;
}

.toggle{
background:transparent;
border:2px solid var(--primary);
color:var(--primary);
}

.container{
max-width:1100px;
margin:40px auto;
padding:20px;
}

.card{
background:var(--card);
padding:25px;
border-radius:20px;
box-shadow:var(--shadow);
margin-bottom:30px;
}

input{
padding:10px;
margin:5px;
border-radius:8px;
border:1px solid #ccc;
}

.kpis{
display:flex;
gap:20px;
flex-wrap:wrap;
margin-bottom:30px;
}

.kpi{
flex:1;
min-width:150px;
text-align:center;
padding:20px;
border-radius:16px;
background:var(--card);
box-shadow:var(--shadow);
transition:.3s;
}

.kpi:hover{
transform:translateY(-5px) scale(1.03);
}

.kpi h2{
margin:0;
font-size:32px;
}

.chart-box{
height:420px;
}

#adminPanel{
animation:fadeIn .6s ease;
}

@keyframes fadeIn{
from{opacity:0; transform:translateY(20px);}
to{opacity:1; transform:translateY(0);}
}

@media(max-width:768px){
.kpis{flex-direction:column;}
}
</style>
</head>

<body>

<header>
<h2>Sistema de Asistencia</h2>
<button class="toggle" onclick="toggleDark()">Modo</button>
</header>

<div class="container">

<div class="card">
<h3>Registrar Asistencia</h3>
<input type="date" id="fecha">
<input type="number" id="virtual" placeholder="Virtual">
<input type="number" id="presencial" placeholder="Presencial">
<button class="primary" onclick="guardar()">Guardar</button>
</div>

<div class="card">
<h3>Login Admin</h3>
<input type="text" id="user" placeholder="Usuario">
<input type="password" id="pass" placeholder="Contraseña">
<button class="primary" onclick="login()">Entrar</button>
</div>

<div id="adminPanel" style="display:none;">

<div class="card">
<h3>Eliminar Registro</h3>
<input type="date" id="fechaEliminar">
<button class="danger" onclick="eliminar()">Eliminar</button>
</div>

<div class="kpis">
<div class="kpi">
<h2 id="totalKPI">0</h2>
<p>Total</p>
</div>
<div class="kpi">
<h2 id="virtualKPI">0%</h2>
<p>Virtual</p>
</div>
<div class="kpi">
<h2 id="presencialKPI">0%</h2>
<p>Presencial</p>
</div>
</div>

<div class="card chart-box">
<canvas id="grafico"></canvas>
</div>

</div>

</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
import { getFirestore, collection, setDoc, doc, getDocs, deleteDoc } 
from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";

const firebaseConfig = {
apiKey: "TU_API_KEY",
authDomain: "TU_AUTH_DOMAIN",
projectId: "TU_PROJECT_ID",
storageBucket: "TU_STORAGE",
messagingSenderId: "TU_ID",
appId: "TU_APP_ID"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

window.guardar = async function(){
const fecha=fecha.value;
const virtualVal=parseInt(virtual.value)||0;
const presencialVal=parseInt(presencial.value)||0;

await setDoc(doc(db,"asistencia",fecha),{
virtual:virtualVal,
presencial:presencialVal
});
alert("Guardado");
};

window.eliminar = async function(){
const fecha=fechaEliminar.value;
if(!fecha) return alert("Selecciona fecha");
await deleteDoc(doc(db,"asistencia",fecha));
alert("Registro eliminado");
cargarGrafico();
};

let chart;

window.login = async function(){
if(user.value==="Landia" && pass.value==="Lapina1115"){
adminPanel.style.display="block";
cargarGrafico();
}else{
alert("Incorrecto");
}
};

async function cargarGrafico(){

const snapshot=await getDocs(collection(db,"asistencia"));

let totalVirtual=0;
let totalPresencial=0;

snapshot.forEach(doc=>{
const data=doc.data();
totalVirtual+=data.virtual;
totalPresencial+=data.presencial;
});

const total=totalVirtual+totalPresencial;
const pVirtual= total?((totalVirtual/total)*100).toFixed(1):0;
const pPresencial= total?((totalPresencial/total)*100).toFixed(1):0;

totalKPI.innerText=total;
virtualKPI.innerText=pVirtual+"%";
presencialKPI.innerText=pPresencial+"%";

if(chart) chart.destroy();

const ctx=document.getElementById("grafico").getContext("2d");

chart=new Chart(ctx,{
type:"bar",
data:{
labels:["Virtual","Presencial"],
datasets:[{
data:[totalVirtual,totalPresencial],
backgroundColor:["#3b82f6","#22c55e"],
borderRadius:15,
hoverBackgroundColor:["#2563eb","#16a34a"]
}]
},
options:{
responsive:true,
maintainAspectRatio:false,
plugins:{
legend:{display:false},
datalabels:{
anchor:"end",
align:"top",
color:"#000",
formatter:(value,context)=>{
return context.dataIndex===0?pVirtual+"%":pPresencial+"%";
},
font:{weight:"bold",size:16}
}
},
animation:{
duration:1800,
easing:"easeOutQuart"
},
scales:{
y:{
beginAtZero:true,
grid:{display:false}
}
}
},
plugins:[ChartDataLabels]
});
}
</script>

<script>
function toggleDark(){
document.body.classList.toggle("dark");
}
</script>

</body>
</html>
