<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Sistema de Asistencia</title>

<link rel="icon" type="image/png" href="Icon2.png">

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
<script src="https://cdn.jsdelivr.net/npm/chartjs-plugin-datalabels@2"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore-compat.js"></script>

<style>
/* === TUS ESTILOS ORIGINALES SIN CAMBIAR === */
:root{
--primary:#6366f1;
--accent:#06b6d4;
--success:#22c55e;
--danger:#ef4444;
--bg:linear-gradient(135deg,#eef2ff,#f8fafc);
--card:rgba(255,255,255,0.65);
--text:#0f172a;
--gray:#64748b;
}

body.dark{
--primary:#8b5cf6;
--accent:#22d3ee;
--success:#4ade80;
--danger:#f87171;
--bg:linear-gradient(135deg,#0f172a,#1e293b);
--card:rgba(30,41,59,0.75);
--text:#f1f5f9;
--gray:#94a3b8;
}

*{margin:0;padding:0;box-sizing:border-box;}

body{
font-family:'Segoe UI',sans-serif;
background:var(--bg);
color:var(--text);
display:flex;
justify-content:center;
align-items:center;
min-height:100vh;
padding:20px;
transition:.6s;
}

.card{
background:var(--card);
backdrop-filter:blur(35px);
width:100%;
max-width:620px;
padding:32px;
border-radius:28px;
box-shadow:0 40px 80px rgba(0,0,0,0.18);
}

.header{
display:flex;
align-items:center;
justify-content:center;
gap:14px;
margin-bottom:25px;
}

.header img{width:42px;}

label{font-size:14px;color:var(--gray);}

input,select{
width:100%;
padding:15px;
margin:10px 0 20px 0;
border-radius:18px;
border:1px solid rgba(255,255,255,0.3);
font-size:15px;
background:rgba(255,255,255,0.6);
}

body.dark input,
body.dark select{
background:rgba(30,41,59,0.6);
border:1px solid #334155;
color:#fff;
}

button{
width:100%;
padding:15px;
border:none;
border-radius:20px;
font-weight:600;
cursor:pointer;
margin-top:10px;
font-size:15px;
}

.primary{
background:linear-gradient(135deg,var(--primary),var(--accent));
color:white;
}

.secondary{
background:linear-gradient(135deg,#64748b,#475569);
color:white;
}

.danger{
background:linear-gradient(135deg,var(--danger),#dc2626);
color:white;
padding:6px 10px;
border-radius:10px;
font-size:12px;
margin-top:8px;
}

.login-box,.admin-panel{display:none;}

.historial{
margin-top:20px;
max-height:240px;
overflow-y:auto;
padding:15px;
border-radius:20px;
background:rgba(255,255,255,0.5);
}

body.dark .historial{
background:rgba(30,41,59,0.6);
}

.historial-item{
padding:16px;
margin-bottom:12px;
background:white;
border-radius:18px;
font-size:14px;
}

body.dark .historial-item{
background:#334155;
}

.theme-toggle{
position:fixed;
top:20px;
right:20px;
width:50px;
height:50px;
border-radius:50%;
border:none;
background:var(--card);
color:var(--primary);
font-size:20px;
cursor:pointer;
}

canvas{margin-top:20px;}
</style>
</head>

<body>

<div class="card">

<div class="header">
<img src="Icon2.png">
<h1>Sistema de Asistencia</h1>
</div>

<label>Seleccionar Fecha</label>
<input type="date" id="fecha">

<label>Asistencia Virtual</label>
<input type="number" id="virtual">

<label>Asistencia Presencial</label>
<input type="number" id="presencial">

<button class="primary" onclick="guardar()">Guardar Asistencia</button>
<button class="secondary" onclick="mostrarLogin()">Zona Administrativa</button>

<div class="login-box" id="loginBox">
<input type="text" id="usuario" placeholder="Usuario">
<input type="password" id="password" placeholder="Contraseña">
<button class="primary" onclick="login()">Entrar</button>
</div>

<div class="admin-panel" id="adminPanel">
<button class="primary" onclick="exportar()">Descargar .txt</button>
<input type="file" accept=".txt,.json" onchange="importar(event)">
<label>Seleccionar Trimestre</label>
<select id="selectorTrimestre" onchange="actualizarGrafico()">
<option value="Q1">Enero - Marzo</option>
<option value="Q2">Abril - Junio</option>
<option value="Q3">Julio - Septiembre</option>
<option value="Q4">Octubre - Diciembre</option>
</select>
<canvas id="graficoPastel"></canvas>
</div>

<div class="historial" id="historial"></div>
</div>

<button class="theme-toggle" onclick="toggleDark()">
<span class="icon">🌙</span>
</button>

<script>
firebase.initializeApp({
apiKey:"AIzaSyBs3r8RFztg6NxUbkZmaSag2CxfF7phvG8",
authDomain:"sistema-asistencia-a47c9.firebaseapp.com",
projectId:"sistema-asistencia-a47c9"
});

const db=firebase.firestore();
let adminActivo=false;
let chart;
let datosTrimestre={Q1:{virtual:0,presencial:0},Q2:{virtual:0,presencial:0},Q3:{virtual:0,presencial:0},Q4:{virtual:0,presencial:0}};

if(localStorage.getItem("modo")==="dark"){
document.body.classList.add("dark");
document.querySelector(".icon").textContent="☀️";
}

function toggleDark(){
document.body.classList.toggle("dark");
const darkActivo=document.body.classList.contains("dark");
document.querySelector(".icon").textContent=darkActivo?"☀️":"🌙";
localStorage.setItem("modo",darkActivo?"dark":"light");
}

function guardar(){
const v=parseInt(virtual.value);
const p=parseInt(presencial.value);
let fechaSeleccionada=fecha.value||new Date().toISOString().split("T")[0];
if(isNaN(v)||isNaN(p)) return alert("Completa ambos campos");

db.collection("asistencia").doc(fechaSeleccionada)
.set({virtual:v,presencial:p})
.then(()=>{virtual.value="";presencial.value="";fecha.value="";mostrar();});
}

function mostrar(){
historial.innerHTML="";
datosTrimestre={Q1:{virtual:0,presencial:0},Q2:{virtual:0,presencial:0},Q3:{virtual:0,presencial:0},Q4:{virtual:0,presencial:0}};

db.collection("asistencia").get().then(snapshot=>{
snapshot.forEach(doc=>{
const fecha=doc.id;
const data=doc.data();
const mes=parseInt(fecha.split("-")[1]);
const q=mes<=3?"Q1":mes<=6?"Q2":mes<=9?"Q3":"Q4";
datosTrimestre[q].virtual+=Number(data.virtual);
datosTrimestre[q].presencial+=Number(data.presencial);

historial.innerHTML+=`
<div class="historial-item">
<strong>${fecha}</strong><br>
Virtual: ${data.virtual} | Presencial: ${data.presencial}
${adminActivo?`<button class="danger" onclick="eliminar('${fecha}')">Eliminar</button>`:""}
</div>`;
});
if(adminActivo) actualizarGrafico();
});
}

function eliminar(fecha){
db.collection("asistencia").doc(fecha).delete().then(()=>mostrar());
}

function actualizarGrafico(){
const t=selectorTrimestre.value;
const v=datosTrimestre[t].virtual;
const p=datosTrimestre[t].presencial;
const total=v+p;
if(chart) chart.destroy();

chart=new Chart(graficoPastel,{
type:"bar",
data:{labels:["Virtual","Presencial"],
datasets:[{data:[v,p],backgroundColor:["#6366f1","#22c55e"],borderRadius:14}]},
options:{
plugins:{
legend:{display:false},
datalabels:{
anchor:"end",
align:"top",
font:{weight:"bold",size:14},
formatter:(value)=> total===0?"0%":((value*100)/total).toFixed(1)+"%"
}}
},
plugins:[ChartDataLabels]
});
}

function mostrarLogin(){loginBox.style.display="block";}

function login(){
const user=usuario.value.trim();
const pass=password.value.trim();
db.collection("usuarios")
.where("usuario","==",user)
.where("password","==",pass)
.get()
.then(snapshot=>{
if(!snapshot.empty){
adminPanel.style.display="block";
loginBox.style.display="none";
adminActivo=true;
mostrar();
}else alert("Credenciales incorrectas");
});
}

/* EXPORTACIÓN */
function exportar(){
db.collection("asistencia").get().then(snapshot=>{
const datos={};
snapshot.forEach(doc=>datos[doc.id]=doc.data());
const blob=new Blob([JSON.stringify(datos,null,2)],{type:"application/json"});
const a=document.createElement("a");
a.href=URL.createObjectURL(blob);
a.download="asistencia.txt";
a.click();
});
}

/* IMPORTACIÓN ARREGLADA */
function importar(e){
const archivo=e.target.files[0];
if(!archivo) return;

const reader=new FileReader();
reader.onload=async function(){
try{
let contenido=reader.result.trim();
contenido=contenido.replace(/,\s*}/g,"}");
const datos=JSON.parse(contenido);

const batch=db.batch();

Object.keys(datos).forEach(fecha=>{
const registro=datos[fecha];
if(registro && registro.virtual!=null && registro.presencial!=null){
const ref=db.collection("asistencia").doc(fecha);
batch.set(ref,{
virtual:Number(registro.virtual),
presencial:Number(registro.presencial)
});
}
});

await batch.commit();
alert("Importación completada correctamente ✅");
mostrar();
e.target.value="";
}catch(error){
alert("Archivo inválido: "+error.message);
}
};

reader.readAsText(archivo);
}

mostrar();
</script>

</body>
</html>
