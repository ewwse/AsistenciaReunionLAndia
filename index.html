<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
import { getFirestore, doc, setDoc, getDocs, collection } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

const firebaseConfig = {
  apiKey: "AIzaSyBs3r8RFztg6NxUbkZmaSag2CxfF7phvG8",
  authDomain: "sistema-asistencia-a47c9.firebaseapp.com",
  projectId: "sistema-asistencia-a47c9",
  storageBucket: "sistema-asistencia-a47c9.firebasestorage.app",
  messagingSenderId: "386197839949",
  appId: "1:386197839949:web:fa84a03ca12f5c4c20bc04"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

const USER="Landia";
const PASS="Lapina1115";

const getFecha=()=> new Date().toISOString().split("T")[0];

window.guardar = async function(){
    const v=document.getElementById("virtual").value;
    const p=document.getElementById("presencial").value;

    if(!v || !p) return alert("Completa ambos campos");

    const fecha = getFecha();

    const registro = {virtual:+v,presencial:+p};

    // Guardar en Firebase
    await setDoc(doc(db,"asistencia",fecha), registro);

    // Respaldo local
    const datos=JSON.parse(localStorage.getItem("asistencia"))||{};
    datos[fecha]=registro;
    localStorage.setItem("asistencia",JSON.stringify(datos));

    mostrar();
}

async function mostrar(){
    const cont=document.getElementById("historial");
    cont.innerHTML="";

    const querySnapshot = await getDocs(collection(db,"asistencia"));
    const datos = {};

    querySnapshot.forEach((docu)=>{
        datos[docu.id] = docu.data();
    });

    Object.keys(datos).sort().reverse().forEach(fecha=>{
        cont.innerHTML+=`
        <div class="historial-item">
            <strong>${fecha}</strong><br>
            Virtual: ${datos[fecha].virtual} |
            Presencial: ${datos[fecha].presencial}
        </div>`;
    });
}

window.mostrarLogin = function(){
    document.getElementById("loginBox").style.display="block";
}

window.login = function(){
    const u=document.getElementById("usuario").value;
    const p=document.getElementById("password").value;

    if(u===USER && p===PASS){
        document.getElementById("adminPanel").style.display="block";
        document.getElementById("loginBox").style.display="none";
    }else{
        alert("Credenciales incorrectas");
    }
}

window.exportar = function(){
    const datos=localStorage.getItem("asistencia");
    if(!datos) return alert("No hay datos");

    const blob=new Blob([datos],{type:"text/plain"});
    const a=document.createElement("a");
    a.href=URL.createObjectURL(blob);
    a.download="asistencia.txt";
    a.click();
}

window.importar = function(e){
    const archivo=e.target.files[0];
    if(!archivo) return;

    const reader=new FileReader();
    reader.onload=()=>{
        try{
            localStorage.setItem("asistencia",reader.result);
            mostrar();
            alert("Datos importados correctamente");
        }catch{
            alert("Archivo inválido");
        }
    };
    reader.readAsText(archivo);
}

mostrar();
</script>
