<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Sistema de Asistencia</title>

<link rel="icon" type="image/png" href="icon.png">

<style>
:root{
    --primary:#2563eb;
    --primary-dark:#1e40af;
    --bg:#f1f5f9;
    --card:#ffffff;
    --gray:#64748b;
    --success:#16a34a;
    --danger:#dc2626;
}
*{margin:0;padding:0;box-sizing:border-box;}
body{
    font-family:'Segoe UI', sans-serif;
    background:var(--bg);
    display:flex;
    justify-content:center;
    align-items:center;
    min-height:100vh;
    padding:20px;
}
.card{
    background:var(--card);
    width:100%;
    max-width:500px;
    padding:25px;
    border-radius:20px;
    box-shadow:0 15px 35px rgba(0,0,0,0.08);
}
.header{
    display:flex;
    align-items:center;
    justify-content:center;
    gap:10px;
    margin-bottom:15px;
}
.header img{width:35px;}
h1{font-size:clamp(18px,4vw,24px);}
label{font-size:14px;color:#334155;}
input{
    width:100%;
    padding:12px;
    margin:8px 0 15px 0;
    border-radius:12px;
    border:1px solid #d1d5db;
    font-size:15px;
}
button{
    width:100%;
    padding:13px;
    border:none;
    border-radius:14px;
    font-weight:600;
    cursor:pointer;
    margin-top:8px;
    font-size:15px;
}
.primary{background:var(--primary);color:white;}
.primary:hover{background:var(--primary-dark);}
.secondary{background:var(--gray);color:white;}
.secondary:hover{background:#475569;}
.danger{
    background:var(--danger);
    color:white;
    padding:6px 10px;
    border-radius:8px;
    font-size:12px;
    margin-top:6px;
}
.admin-panel{display:none;margin-top:15px;padding:15px;border-radius:15px;background:#f8fafc;border:1px solid #e2e8f0;}
.login-box{display:none;margin-top:15px;}
.historial{margin-top:20px;max-height:200px;overflow-y:auto;padding:10px;border-radius:12px;background:#f8fafc;border:1px solid #e2e8f0;}
.historial-item{
    padding:10px;
    margin-bottom:8px;
    background:white;
    border-radius:10px;
    box-shadow:0 3px 6px rgba(0,0,0,0.05);
    font-size:14px;
}
.stats{margin-top:15px;display:none;}
.progress{height:18px;background:#e2e8f0;border-radius:10px;overflow:hidden;margin-top:6px;}
.bar{height:100%;width:0%;background:var(--success);transition:0.4s;}
.percent-text{font-size:14px;margin-top:5px;}
</style>
</head>
<body>

<div class="card">
<div class="header">
<img src="icon.png" alt="icono">
<h1>Sistema de Asistencia</h1>
</div>

<label>Asistencia Virtual</label>
<input type="number" id="virtual" placeholder="Cantidad">

<label>Asistencia Presencial</label>
<input type="number" id="presencial" placeholder="Cantidad">

<button class="primary" onclick="guardar()">Guardar Asistencia</button>
<button class="secondary" onclick="mostrarLogin()">Zona Administrativa</button>

<div class="login-box" id="loginBox">
<input type="text" id="usuario" placeholder="Usuario">
<input type="password" id="password" placeholder="Contraseña">
<button class="primary" onclick="login()">Entrar</button>
</div>

<div class="admin-panel" id="adminPanel">
<button class="primary" onclick="exportar()">Descargar .txt</button>
<input type="file" accept=".txt" onchange="importar(event)" style="margin-top:10px;">

<div class="stats" id="statsBox">
<h3 style="margin-top:15px;">Porcentaje Virtual</h3>
<div class="progress"><div class="bar" id="barra"></div></div>
<div class="percent-text" id="percentText"></div>
</div>
</div>

<div class="historial" id="historial"></div>
</div>

<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore-compat.js"></script>

<script>
document.addEventListener("DOMContentLoaded", function(){

const firebaseConfig={
apiKey:"AIzaSyBs3r8RFztg6NxUbkZmaSag2CxfF7phvG8",
authDomain:"sistema-asistencia-a47c9.firebaseapp.com",
projectId:"sistema-asistencia-a47c9",
storageBucket:"sistema-asistencia-a47c9.firebasestorage.app",
messagingSenderId:"386197839949",
appId:"1:386197839949:web:fa84a03ca12f5c4c20bc04"
};

firebase.initializeApp(firebaseConfig);
const db=firebase.firestore();

const USER="Landia";
const PASS="Lapina1115";
let adminActivo=false;

const getFecha=()=>new Date().toISOString().split("T")[0];

window.guardar=function(){
const v=+virtual.value;
const p=+presencial.value;
if(!v||!p) return alert("Completa ambos campos");

db.collection("asistencia").doc(getFecha()).set({virtual:v,presencial:p})
.then(()=>mostrar());
}

function mostrar(){
const cont=historial;
cont.innerHTML="";
let totalV=0,totalP=0;

db.collection("asistencia").get().then(snapshot=>{
const datos={};
snapshot.forEach(doc=>{
datos[doc.id]=doc.data();
totalV+=doc.data().virtual;
totalP+=doc.data().presencial;
});

Object.keys(datos).sort().reverse().forEach(fecha=>{
cont.innerHTML+=`
<div class="historial-item">
<strong>${fecha}</strong><br>
Virtual: ${datos[fecha].virtual} |
Presencial: ${datos[fecha].presencial}
${adminActivo?`<button class="danger" onclick="eliminar('${fecha}')">Eliminar</button>`:""}
</div>`;
});

actualizarPorcentaje(totalV,totalP);
});
}

window.eliminar=function(fecha){
if(!confirm("¿Eliminar registro de "+fecha+"?")) return;

db.collection("asistencia").doc(fecha).delete()
.then(()=>mostrar());
}

function actualizarPorcentaje(v,p){
const total=v+p;
if(total===0) return;
const porcentaje=Math.round((v/total)*100);
barra.style.width=porcentaje+"%";
percentText.innerText=
porcentaje+"% Virtual / "+(100-porcentaje)+"% Presencial";
}

window.mostrarLogin=function(){
loginBox.style.display="block";
}

window.login=function(){
if(usuario.value===USER&&password.value===PASS){
adminPanel.style.display="block";
loginBox.style.display="none";
statsBox.style.display="block";
adminActivo=true;
mostrar();
}else{
alert("Credenciales incorrectas");
}
}

window.exportar=function(){
db.collection("asistencia").get().then(snapshot=>{
const datos={};
snapshot.forEach(doc=>datos[doc.id]=doc.data());
const blob=new Blob([JSON.stringify(datos)],{type:"text/plain"});
const a=document.createElement("a");
a.href=URL.createObjectURL(blob);
a.download="asistencia.txt";
a.click();
});
}

window.importar=function(e){
const archivo=e.target.files[0];
if(!archivo) return;
const reader=new FileReader();
reader.onload=()=>{
try{
const datos=JSON.parse(reader.result);
Object.keys(datos).forEach(fecha=>{
db.collection("asistencia").doc(fecha).set(datos[fecha]);
});
mostrar();
alert("Datos importados correctamente");
}catch{alert("Archivo inválido");}
};
reader.readAsText(archivo);
}

mostrar();
});
</script>

</body>
</html>
