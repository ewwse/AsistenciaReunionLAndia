<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Sistema de Asistencia</title>

<style>
:root{
    --primary:#2563eb;
    --primary-dark:#1e40af;
    --bg:#f1f5f9;
    --card:#ffffff;
    --gray:#64748b;
}
*{margin:0;padding:0;box-sizing:border-box;}
body{
    font-family:'Segoe UI', sans-serif;
    background:var(--bg);
    display:flex;
    justify-content:center;
    align-items:center;
    min-height:100vh;
    padding:20px;
}
.card{
    background:var(--card);
    width:100%;
    max-width:500px;
    padding:25px;
    border-radius:20px;
    box-shadow:0 15px 35px rgba(0,0,0,0.08);
}
h1{text-align:center;margin-bottom:20px;font-size:clamp(18px, 4vw, 24px);}
label{font-size:14px;color:#334155;}
input{
    width:100%;
    padding:12px;
    margin:8px 0 15px 0;
    border-radius:12px;
    border:1px solid #d1d5db;
    font-size:15px;
}
button{
    width:100%;
    padding:13px;
    border:none;
    border-radius:14px;
    font-weight:600;
    cursor:pointer;
    margin-top:8px;
    transition:0.3s;
    font-size:15px;
}
.primary{background:var(--primary);color:white;}
.primary:hover{background:var(--primary-dark);}
.secondary{background:var(--gray);color:white;}
.secondary:hover{background:#475569;}

.admin-panel{
    display:none;
    margin-top:15px;
    padding:15px;
    border-radius:15px;
    background:#f8fafc;
    border:1px solid #e2e8f0;
}

.porcentajes{
    margin-top:15px;
    padding:15px;
    border-radius:15px;
    background:#eef2ff;
    border:1px solid #c7d2fe;
    display:none;
    font-size:14px;
}

.login-box{display:none;margin-top:15px;}
.historial{
    margin-top:20px;
    max-height:220px;
    overflow-y:auto;
    padding:10px;
    border-radius:12px;
    background:#f8fafc;
    border:1px solid #e2e8f0;
}
.historial-item{
    padding:10px;
    margin-bottom:8px;
    background:white;
    border-radius:10px;
    box-shadow:0 3px 6px rgba(0,0,0,0.05);
    font-size:14px;
}
</style>
</head>
<body>

<div class="card">
<h1>📊 Sistema de Asistencia</h1>

<label>Asistencia Virtual</label>
<input type="number" id="virtual" placeholder="Cantidad">

<label>Asistencia Presencial</label>
<input type="number" id="presencial" placeholder="Cantidad">

<button class="primary" onclick="guardar()">Guardar Asistencia</button>
<button class="secondary" onclick="mostrarLogin()">Zona Administrativa</button>

<div class="login-box" id="loginBox">
    <input type="text" id="usuario" placeholder="Usuario">
    <input type="password" id="password" placeholder="Contraseña">
    <button class="primary" onclick="login()">Entrar</button>
</div>

<div class="admin-panel" id="adminPanel">
    <button class="primary" onclick="exportar()">Descargar .txt</button>
    <input type="file" accept=".txt" onchange="importar(event)" style="margin-top:10px;">
</div>

<div class="porcentajes" id="porcentajes"></div>

<div class="historial" id="historial"></div>
</div>

<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore-compat.js"></script>

<script>
document.addEventListener("DOMContentLoaded", function() {

const firebaseConfig = {
  apiKey: "TU_API_KEY",
  authDomain: "TU_AUTH_DOMAIN",
  projectId: "TU_PROJECT_ID",
  storageBucket: "TU_STORAGE",
  messagingSenderId: "TU_MSG_ID",
  appId: "TU_APP_ID"
};

firebase.initializeApp(firebaseConfig);
const db = firebase.firestore();

const USER="Landia";
const PASS="Lapina1115";

const getFecha=()=> new Date().toISOString().split("T")[0];

window.guardar=function(){
    const v=+document.getElementById("virtual").value;
    const p=+document.getElementById("presencial").value;
    if(!v || !p) return alert("Completa ambos campos");

    const fecha=getFecha();
    db.collection("asistencia").doc(fecha).set({virtual:v,presencial:p})
    .then(()=>mostrar());
}

function mostrar(){
    const cont=document.getElementById("historial");
    cont.innerHTML="";
    let totalV=0,totalP=0;

    db.collection("asistencia").get().then(snapshot=>{
        const datos={};
        snapshot.forEach(doc=>{
            datos[doc.id]=doc.data();
            totalV+=doc.data().virtual;
            totalP+=doc.data().presencial;
        });

        Object.keys(datos).sort().reverse().forEach(fecha=>{
            cont.innerHTML+=`
            <div class="historial-item">
                <strong>${fecha}</strong><br>
                Virtual: ${datos[fecha].virtual} |
                Presencial: ${datos[fecha].presencial}
            </div>`;
        });

        calcularPorcentajes(totalV,totalP);
    });
}

function calcularPorcentajes(v,p){
    const div=document.getElementById("porcentajes");
    const total=v+p;
    if(total===0) return;

    const pv=((v/total)*100).toFixed(2);
    const pp=((p/total)*100).toFixed(2);

    div.innerHTML=`
        <strong>Estadísticas Globales:</strong><br><br>
        Total Virtual: ${v} (${pv}%)<br>
        Total Presencial: ${p} (${pp}%)
    `;
}

window.mostrarLogin=function(){
    document.getElementById("loginBox").style.display="block";
}

window.login=function(){
    const u=document.getElementById("usuario").value;
    const p=document.getElementById("password").value;

    if(u===USER && p===PASS){
        document.getElementById("adminPanel").style.display="block";
        document.getElementById("loginBox").style.display="none";
        document.getElementById("porcentajes").style.display="block";
        mostrar();
    }else{
        alert("Credenciales incorrectas");
    }
}

window.exportar=function(){
    db.collection("asistencia").get().then(snapshot=>{
        const datos={};
        snapshot.forEach(doc=>{
            datos[doc.id]=doc.data();
        });
        const blob=new Blob([JSON.stringify(datos)],{type:"text/plain"});
        const a=document.createElement("a");
        a.href=URL.createObjectURL(blob);
        a.download="asistencia.txt";
        a.click();
    });
}

window.importar=function(e){
    const archivo=e.target.files[0];
    if(!archivo) return;

    const reader=new FileReader();
    reader.onload=()=>{
        try{
            const datos=JSON.parse(reader.result);
            Object.keys(datos).forEach(fecha=>{
                db.collection("asistencia").doc(fecha).set(datos[fecha]);
            });
            mostrar();
            alert("Datos importados correctamente");
        }catch{
            alert("Archivo inválido");
        }
    };
    reader.readAsText(archivo);
}

mostrar();
});
</script>

</body>
</html>
