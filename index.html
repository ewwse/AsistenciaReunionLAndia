<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Sistema de Asistencia</title>

<link rel="icon" type="image/png" href="icon.png">
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore-compat.js"></script>

<style>
:root{
    --primary:#2563eb;
    --primary-dark:#1e40af;
    --bg:#f1f5f9;
    --card:#ffffff;
    --gray:#64748b;
    --danger:#dc2626;
    --text:#0f172a;
}

body.dark{
    --bg:#0f172a;
    --card:#1e293b;
    --gray:#94a3b8;
    --text:#f1f5f9;
}

*{margin:0;padding:0;box-sizing:border-box;}

body{
    font-family:'Segoe UI',sans-serif;
    background:var(--bg);
    color:var(--text);
    display:flex;
    justify-content:center;
    align-items:center;
    min-height:100vh;
    padding:20px;
    transition:background .4s ease,color .4s ease;
}

.card{
    background:var(--card);
    width:100%;
    max-width:600px;
    padding:25px;
    border-radius:20px;
    box-shadow:0 15px 35px rgba(0,0,0,0.08);
    transition:all .4s ease;
    animation:fadeUp .6s ease;
}

@keyframes fadeUp{
    from{opacity:0;transform:translateY(20px);}
    to{opacity:1;transform:translateY(0);}
}

.header{
    display:flex;
    align-items:center;
    justify-content:center;
    gap:10px;
    margin-bottom:15px;
}

.header img{width:35px;}

h1{font-size:clamp(18px,4vw,24px);}

.toggle-theme{
    position:absolute;
    top:20px;
    right:20px;
    background:var(--card);
    border-radius:50%;
    width:45px;
    height:45px;
    display:flex;
    align-items:center;
    justify-content:center;
    cursor:pointer;
    box-shadow:0 8px 20px rgba(0,0,0,0.15);
    transition:all .3s ease;
}

.toggle-theme:hover{
    transform:rotate(20deg) scale(1.1);
}

label{font-size:14px;color:var(--gray);}

input,select{
    width:100%;
    padding:12px;
    margin:8px 0 15px 0;
    border-radius:12px;
    border:1px solid #d1d5db;
    font-size:15px;
    transition:.3s;
}

input:focus{
    border-color:var(--primary);
    outline:none;
    box-shadow:0 0 0 3px rgba(37,99,235,0.2);
}

button{
    width:100%;
    padding:13px;
    border:none;
    border-radius:14px;
    font-weight:600;
    cursor:pointer;
    margin-top:8px;
    font-size:15px;
    transition:all .3s ease;
}

button:hover{
    transform:translateY(-2px);
    box-shadow:0 6px 15px rgba(0,0,0,0.15);
}

.primary{background:var(--primary);color:white;}
.primary:hover{background:var(--primary-dark);}

.secondary{background:var(--gray);color:white;}

.danger{
    background:var(--danger);
    color:white;
    padding:6px 10px;
    border-radius:8px;
    font-size:12px;
    margin-top:6px;
}

.login-box,.admin-panel{
    display:none;
    animation:fadeUp .5s ease;
}

.historial{
    margin-top:20px;
    max-height:200px;
    overflow-y:auto;
    padding:10px;
    border-radius:12px;
    background:rgba(0,0,0,0.03);
}

.historial-item{
    padding:10px;
    margin-bottom:8px;
    background:var(--card);
    border-radius:10px;
    box-shadow:0 3px 6px rgba(0,0,0,0.05);
    font-size:14px;
    transition:.3s;
}

.historial-item:hover{
    transform:translateX(5px);
}

canvas{margin-top:20px;}
</style>
</head>
<body>

<div class="toggle-theme" onclick="toggleTheme()" id="themeBtn">🌙</div>

<div class="card">

<div class="header">
<img src="icon.png" alt="icono">
<h1>Sistema de Asistencia</h1>
</div>

<label>Asistencia Virtual</label>
<input type="number" id="virtual" placeholder="Cantidad">

<label>Asistencia Presencial</label>
<input type="number" id="presencial" placeholder="Cantidad">

<button class="primary" onclick="guardar()">Guardar Asistencia</button>
<button class="secondary" onclick="mostrarLogin()">Zona Administrativa</button>

<div class="login-box" id="loginBox">
<input type="text" id="usuario" placeholder="Usuario">
<input type="password" id="password" placeholder="Contraseña">
<button class="primary" onclick="login()">Entrar</button>
</div>

<div class="admin-panel" id="adminPanel">

<button class="primary" onclick="exportar()">Descargar .txt</button>
<input type="file" accept=".txt" onchange="importar(event)">

<label>Seleccionar Trimestre</label>
<select id="selectorTrimestre" onchange="actualizarGrafico()">
<option value="Q1">Enero - Marzo</option>
<option value="Q2">Abril - Junio</option>
<option value="Q3">Julio - Septiembre</option>
<option value="Q4">Octubre - Diciembre</option>
</select>

<canvas id="graficoPastel"></canvas>

</div>

<div class="historial" id="historial"></div>

</div>

<script>
document.addEventListener("DOMContentLoaded", function(){

const firebaseConfig={
apiKey:"AIzaSyBs3r8RFztg6NxUbkZmaSag2CxfF7phvG8",
authDomain:"sistema-asistencia-a47c9.firebaseapp.com",
projectId:"sistema-asistencia-a47c9"
};

firebase.initializeApp(firebaseConfig);
const db=firebase.firestore();

const USER="Landia";
const PASS="Lapina1115";

let adminActivo=false;
let chart;

let datosTrimestre={Q1:{virtual:0,presencial:0},Q2:{virtual:0,presencial:0},Q3:{virtual:0,presencial:0},Q4:{virtual:0,presencial:0}};

const getFecha=()=>new Date().toISOString().split("T")[0];

window.guardar=function(){
const v=parseInt(virtual.value);
const p=parseInt(presencial.value);
if(isNaN(v)||isNaN(p)) return alert("Completa ambos campos");

db.collection("asistencia").doc(getFecha()).set({virtual:v,presencial:p})
.then(()=>{
virtual.value="";
presencial.value="";
mostrar();
});
};

function mostrar(){
historial.innerHTML="";
datosTrimestre={Q1:{virtual:0,presencial:0},Q2:{virtual:0,presencial:0},Q3:{virtual:0,presencial:0},Q4:{virtual:0,presencial:0}};
db.collection("asistencia").get().then(snapshot=>{
snapshot.forEach(doc=>{
const fecha=doc.id;
const data=doc.data();
const mes=parseInt(fecha.split("-")[1]);
if(mes<=3){datosTrimestre.Q1.virtual+=data.virtual;datosTrimestre.Q1.presencial+=data.presencial;}
else if(mes<=6){datosTrimestre.Q2.virtual+=data.virtual;datosTrimestre.Q2.presencial+=data.presencial;}
else if(mes<=9){datosTrimestre.Q3.virtual+=data.virtual;datosTrimestre.Q3.presencial+=data.presencial;}
else{datosTrimestre.Q4.virtual+=data.virtual;datosTrimestre.Q4.presencial+=data.presencial;}

historial.innerHTML+=`
<div class="historial-item">
<strong>${fecha}</strong><br>
Virtual: ${data.virtual} | Presencial: ${data.presencial}
</div>`;
});
if(adminActivo) actualizarGrafico();
});
}

window.login=function(){
if(usuario.value===USER&&password.value===PASS){
adminPanel.style.display="block";
loginBox.style.display="none";
adminActivo=true;
mostrar();
}else alert("Credenciales incorrectas");
};

window.mostrarLogin=function(){
loginBox.style.display="block";
};

window.actualizarGrafico=function(){
const trimestre=selectorTrimestre.value;
const v=datosTrimestre[trimestre].virtual;
const p=datosTrimestre[trimestre].presencial;

if(chart) chart.destroy();

chart=new Chart(graficoPastel,{
type:"doughnut",
data:{
labels:["Virtual","Presencial"],
datasets:[{
data:[v,p],
backgroundColor:["#2563eb","#16a34a"],
borderWidth:2
}]
},
options:{
responsive:true,
animation:{duration:1400},
plugins:{legend:{position:"bottom"}}
}
});
};

window.exportar=function(){
db.collection("asistencia").get().then(snapshot=>{
const datos={};
snapshot.forEach(doc=>datos[doc.id]=doc.data());
const blob=new Blob([JSON.stringify(datos,null,2)],{type:"text/plain"});
const a=document.createElement("a");
a.href=URL.createObjectURL(blob);
a.download="asistencia.txt";
a.click();
});
};

window.importar=function(e){
const archivo=e.target.files[0];
if(!archivo) return;
const reader=new FileReader();
reader.onload=()=>{
try{
const datos=JSON.parse(reader.result);
Object.keys(datos).forEach(fecha=>{
db.collection("asistencia").doc(fecha).set(datos[fecha]);
});
mostrar();
}catch{alert("Archivo inválido");}
};
reader.readAsText(archivo);
};

mostrar();
});

/* =========================
   MODO OSCURO
========================= */
function toggleTheme(){
document.body.classList.toggle("dark");
const btn=document.getElementById("themeBtn");

if(document.body.classList.contains("dark")){
btn.textContent="☀️";
localStorage.setItem("theme","dark");
}else{
btn.textContent="🌙";
localStorage.setItem("theme","light");
}
}

if(localStorage.getItem("theme")==="dark"){
document.body.classList.add("dark");
document.getElementById("themeBtn").textContent="☀️";
}
</script>

</body>
</html>
