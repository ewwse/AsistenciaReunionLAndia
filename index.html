<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Sistema de Asistencia</title>

<link rel="icon" type="image/png" href="icon.png">
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
<script src="https://cdn.jsdelivr.net/npm/chartjs-plugin-datalabels@2"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore-compat.js"></script>

<style>
:root{
--primary:#4f46e5;
--accent:#06b6d4;
--success:#22c55e;
--danger:#ef4444;
--bg:linear-gradient(135deg,#eef2ff,#f8fafc);
--card:rgba(255,255,255,0.75);
--text:#0f172a;
--gray:#64748b;
}

body.dark{
--primary:#818cf8;
--accent:#22d3ee;
--success:#4ade80;
--danger:#f87171;
--bg:linear-gradient(135deg,#0f172a,#1e293b);
--card:rgba(30,41,59,0.8);
--text:#f1f5f9;
--gray:#94a3b8;
}

*{margin:0;padding:0;box-sizing:border-box;}

body{
font-family:'Segoe UI',sans-serif;
background:var(--bg);
background-attachment:fixed;
color:var(--text);
display:flex;
justify-content:center;
align-items:center;
min-height:100vh;
padding:20px;
transition:all .6s cubic-bezier(.4,0,.2,1);
}

.card{
background:var(--card);
backdrop-filter:blur(20px);
width:100%;
max-width:600px;
padding:30px;
border-radius:24px;
box-shadow:0 25px 70px rgba(0,0,0,0.15);
animation:fadeIn .8s ease;
transition:.4s;
}

@keyframes fadeIn{
from{opacity:0;transform:translateY(30px);}
to{opacity:1;transform:translateY(0);}
}

.header{
display:flex;
align-items:center;
justify-content:center;
gap:12px;
margin-bottom:20px;
}

.header img{width:40px;transition:.5s;}
.header img:hover{transform:rotate(10deg) scale(1.1);}

h1{font-size:24px;font-weight:600;}

label{font-size:14px;color:var(--gray);}

input,select{
width:100%;
padding:14px;
margin:8px 0 18px 0;
border-radius:16px;
border:1px solid #e2e8f0;
font-size:15px;
background:rgba(255,255,255,0.7);
transition:.3s ease;
}

body.dark input,
body.dark select{
background:rgba(30,41,59,0.6);
border:1px solid #334155;
color:#fff;
}

input:focus,select:focus{
outline:none;
border-color:var(--primary);
box-shadow:0 0 0 4px rgba(79,70,229,0.25);
transform:scale(1.02);
}

button{
width:100%;
padding:15px;
border:none;
border-radius:18px;
font-weight:600;
cursor:pointer;
margin-top:10px;
font-size:15px;
transition:all .3s cubic-bezier(.4,0,.2,1);
}

button:hover{
transform:translateY(-4px) scale(1.03);
}

.primary{
background:linear-gradient(135deg,var(--primary),var(--accent));
color:white;
box-shadow:0 10px 25px rgba(79,70,229,0.35);
}

.secondary{
background:linear-gradient(135deg,#64748b,#475569);
color:white;
}

.danger{
background:linear-gradient(135deg,var(--danger),#dc2626);
color:white;
padding:6px 10px;
border-radius:10px;
font-size:12px;
margin-top:6px;
}

.login-box,.admin-panel{display:none;}

.historial{
margin-top:20px;
max-height:220px;
overflow-y:auto;
padding:12px;
border-radius:18px;
background:rgba(255,255,255,0.6);
border:1px solid #e2e8f0;
transition:.4s;
}

body.dark .historial{
background:rgba(30,41,59,0.6);
border:1px solid #334155;
}

.historial-item{
padding:14px;
margin-bottom:10px;
background:white;
border-radius:16px;
box-shadow:0 8px 20px rgba(0,0,0,0.08);
font-size:14px;
animation:slideUp .4s ease;
transition:.3s;
}

.historial-item:hover{
transform:translateY(-3px);
box-shadow:0 12px 30px rgba(0,0,0,0.15);
}

@keyframes slideUp{
from{opacity:0;transform:translateY(15px);}
to{opacity:1;transform:translateY(0);}
}

body.dark .historial-item{background:#334155;}

.theme-toggle{
position:fixed;
top:25px;
right:25px;
width:55px;
height:55px;
border-radius:50%;
border:none;
background:var(--card);
backdrop-filter:blur(12px);
color:var(--primary);
font-size:22px;
cursor:pointer;
box-shadow:0 15px 35px rgba(0,0,0,0.3);
display:flex;
align-items:center;
justify-content:center;
transition:.4s;
}

.theme-toggle:hover{
transform:rotate(180deg) scale(1.1);
}
</style>
</head>

<body>

<div class="card">

<div class="header">
<img src="icon.png">
<h1>Sistema de Asistencia</h1>
</div>

<label>Seleccionar Fecha</label>
<input type="date" id="fecha">

<label>Asistencia Virtual</label>
<input type="number" id="virtual">

<label>Asistencia Presencial</label>
<input type="number" id="presencial">

<button class="primary" onclick="guardar()">Guardar Asistencia</button>
<button class="secondary" onclick="mostrarLogin()">Zona Administrativa</button>

<div class="login-box" id="loginBox">
<input type="text" id="usuario" placeholder="Usuario">
<input type="password" id="password" placeholder="Contraseña">
<button class="primary" onclick="login()">Entrar</button>
</div>

<div class="admin-panel" id="adminPanel">

<button class="primary" onclick="exportar()">Descargar .txt</button>
<input type="file" accept=".txt" onchange="importar(event)">

<label>Seleccionar Trimestre</label>
<select id="selectorTrimestre" onchange="actualizarGrafico()">
<option value="Q1">Enero - Marzo</option>
<option value="Q2">Abril - Junio</option>
<option value="Q3">Julio - Septiembre</option>
<option value="Q4">Octubre - Diciembre</option>
</select>

<canvas id="graficoPastel"></canvas>

</div>

<div class="historial" id="historial"></div>

</div>

<button class="theme-toggle" onclick="toggleDark()">
<span class="icon">🌙</span>
</button>

<script>
firebase.initializeApp({
apiKey:"AIzaSyBs3r8RFztg6NxUbkZmaSag2CxfF7phvG8",
authDomain:"sistema-asistencia-a47c9.firebaseapp.com",
projectId:"sistema-asistencia-a47c9"
});

const db=firebase.firestore();
let adminActivo=false;
let chart;
let datosTrimestre={Q1:{virtual:0,presencial:0},Q2:{virtual:0,presencial:0},Q3:{virtual:0,presencial:0},Q4:{virtual:0,presencial:0}};

function toggleDark(){
document.body.classList.toggle("dark");
const icon=document.querySelector(".icon");
icon.textContent=document.body.classList.contains("dark")?"☀️":"🌙";
}

function guardar(){
const v=parseInt(virtual.value);
const p=parseInt(presencial.value);
let fechaSeleccionada=fecha.value;

if(!fechaSeleccionada){
fechaSeleccionada=new Date().toISOString().split("T")[0];
}

if(isNaN(v)||isNaN(p)) return alert("Completa ambos campos");

db.collection("asistencia").doc(fechaSeleccionada).set({virtual:v,presencial:p})
.then(()=>{
virtual.value="";
presencial.value="";
fecha.value="";
mostrar();
});
}

function mostrar(){
historial.innerHTML="";
datosTrimestre={Q1:{virtual:0,presencial:0},Q2:{virtual:0,presencial:0},Q3:{virtual:0,presencial:0},Q4:{virtual:0,presencial:0}};
db.collection("asistencia").get().then(snapshot=>{
snapshot.forEach(doc=>{
const fecha=doc.id;
const data=doc.data();
const mes=parseInt(fecha.split("-")[1]);
const q=mes<=3?"Q1":mes<=6?"Q2":mes<=9?"Q3":"Q4";
datosTrimestre[q].virtual+=data.virtual;
datosTrimestre[q].presencial+=data.presencial;

historial.innerHTML+=`
<div class="historial-item">
<strong>${fecha}</strong><br>
Virtual: ${data.virtual} | Presencial: ${data.presencial}
${adminActivo?`<button class="danger" onclick="eliminar('${fecha}')">Eliminar</button>`:""}
</div>`;
});
if(adminActivo) actualizarGrafico();
});
}

function eliminar(fecha){
db.collection("asistencia").doc(fecha).delete().then(()=>mostrar());
}

function actualizarGrafico(){
const t=selectorTrimestre.value;
const v=datosTrimestre[t].virtual;
const p=datosTrimestre[t].presencial;
const total=v+p;

if(chart) chart.destroy();

chart=new Chart(graficoPastel,{
type:"doughnut",
data:{
labels:["Virtual","Presencial"],
datasets:[{
data:[v,p],
backgroundColor:["#4f46e5","#22c55e"],
borderWidth:4
}]
},
options:{
cutout:"65%",
animation:{duration:1800,easing:"easeOutBounce"},
plugins:{
legend:{position:"bottom"},
datalabels:{
color:"#fff",
font:{weight:"bold",size:16},
formatter:(value)=>{
if(total===0) return "0%";
return ((value*100)/total).toFixed(1)+"%";
}
}
}
},
plugins:[ChartDataLabels]
});
}

function mostrarLogin(){ loginBox.style.display="block"; }

function login(){
const user=usuario.value.trim();
const pass=password.value.trim();
db.collection("usuarios")
.where("usuario","==",user)
.where("password","==",pass)
.get()
.then(snapshot=>{
if(!snapshot.empty){
adminPanel.style.display="block";
loginBox.style.display="none";
adminActivo=true;
mostrar();
}else{
alert("Credenciales incorrectas");
}
});
}

function exportar(){
db.collection("asistencia").get().then(snapshot=>{
const datos={};
snapshot.forEach(doc=>datos[doc.id]=doc.data());
const blob=new Blob([JSON.stringify(datos,null,2)],{type:"text/plain"});
const a=document.createElement("a");
a.href=URL.createObjectURL(blob);
a.download="asistencia.txt";
a.click();
});
}

function importar(e){
const archivo=e.target.files[0];
const reader=new FileReader();
reader.onload=()=>{
const datos=JSON.parse(reader.result);
Object.keys(datos).forEach(fecha=>{
db.collection("asistencia").doc(fecha).set(datos[fecha]);
});
mostrar();
};
reader.readAsText(archivo);
}

mostrar();
</script>

</body>
</html>
