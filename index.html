<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Sistema de Asistencia</title>

<link rel="icon" type="image/png" href="icon.png">
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
<script src="https://cdn.jsdelivr.net/npm/chartjs-plugin-datalabels@2"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore-compat.js"></script>

<style>
:root{
    --primary:#2563eb;
    --primary-dark:#1e40af;
    --bg:#f1f5f9;
    --card:#ffffff;
    --gray:#64748b;
    --danger:#dc2626;
    --text:#0f172a;
}

body.dark{
    --bg:#0f172a;
    --card:#1e293b;
    --gray:#94a3b8;
    --text:#f1f5f9;
}

*{margin:0;padding:0;box-sizing:border-box;}

body{
    font-family:'Segoe UI',sans-serif;
    background:var(--bg);
    color:var(--text);
    display:flex;
    justify-content:center;
    align-items:center;
    min-height:100vh;
    padding:20px;
    transition:background .4s ease,color .4s ease;
}

.card{
    background:var(--card);
    width:100%;
    max-width:600px;
    padding:25px;
    border-radius:20px;
    box-shadow:0 15px 35px rgba(0,0,0,0.08);
    transition:all .4s ease;
    animation:fadeIn .6s ease;
}

@keyframes fadeIn{
    from{opacity:0;transform:translateY(20px);}
    to{opacity:1;transform:translateY(0);}
}

.header{
    display:flex;
    align-items:center;
    justify-content:space-between;
    margin-bottom:15px;
}

.header-left{
    display:flex;
    align-items:center;
    gap:10px;
}

.header img{width:35px;}

.toggle{
    background:transparent;
    border:2px solid var(--primary);
    color:var(--primary);
    padding:6px 10px;
    border-radius:10px;
    cursor:pointer;
    transition:.3s;
}

.toggle:hover{
    transform:scale(1.05);
}

h1{font-size:clamp(18px,4vw,24px);}

label{font-size:14px;color:var(--gray);}

input,select{
    width:100%;
    padding:12px;
    margin:8px 0 15px 0;
    border-radius:12px;
    border:1px solid #d1d5db;
    font-size:15px;
    transition:.3s;
}

input:focus,select:focus{
    outline:none;
    border-color:var(--primary);
    box-shadow:0 0 0 3px rgba(37,99,235,0.2);
}

button{
    width:100%;
    padding:13px;
    border:none;
    border-radius:14px;
    font-weight:600;
    cursor:pointer;
    margin-top:8px;
    font-size:15px;
    transition:.3s;
}

button:hover{
    transform:translateY(-3px);
}

.primary{background:var(--primary);color:white;}
.primary:hover{background:var(--primary-dark);}

.secondary{background:var(--gray);color:white;}
.secondary:hover{background:#475569;}

.danger{
    background:var(--danger);
    color:white;
    padding:6px 10px;
    border-radius:8px;
    font-size:12px;
    margin-top:6px;
}

.login-box,.admin-panel{display:none;}

.historial{
    margin-top:20px;
    max-height:200px;
    overflow-y:auto;
    padding:10px;
    border-radius:12px;
    background:#f8fafc;
    border:1px solid #e2e8f0;
    transition:.3s;
}

body.dark .historial{
    background:#1e293b;
    border:1px solid #334155;
}

.historial-item{
    padding:10px;
    margin-bottom:8px;
    background:white;
    border-radius:10px;
    box-shadow:0 3px 6px rgba(0,0,0,0.05);
    font-size:14px;
    animation:fadeIn .4s ease;
}

body.dark .historial-item{
    background:#334155;
}

canvas{
    margin-top:20px;
    animation:fadeIn .8s ease;
}
</style>
</head>
<body>

<div class="card">

<div class="header">
<div class="header-left">
<img src="icon.png">
<h1>Sistema de Asistencia</h1>
</div>
<button class="toggle" onclick="toggleDark()">Modo</button>
</div>

<label>Asistencia Virtual</label>
<input type="number" id="virtual">

<label>Asistencia Presencial</label>
<input type="number" id="presencial">

<button class="primary" onclick="guardar()">Guardar Asistencia</button>
<button class="secondary" onclick="mostrarLogin()">Zona Administrativa</button>

<div class="login-box" id="loginBox">
<input type="text" id="usuario" placeholder="Usuario">
<input type="password" id="password" placeholder="Contraseña">
<button class="primary" onclick="login()">Entrar</button>
</div>

<div class="admin-panel" id="adminPanel">

<button class="primary" onclick="exportar()">Descargar .txt</button>
<input type="file" accept=".txt" onchange="importar(event)">

<label>Seleccionar Trimestre</label>
<select id="selectorTrimestre" onchange="actualizarGrafico()">
<option value="Q1">Enero - Marzo</option>
<option value="Q2">Abril - Junio</option>
<option value="Q3">Julio - Septiembre</option>
<option value="Q4">Octubre - Diciembre</option>
</select>

<canvas id="graficoPastel"></canvas>

</div>

<div class="historial" id="historial"></div>

</div>

<script>
function toggleDark(){
document.body.classList.toggle("dark");
}
</script>

<script>
document.addEventListener("DOMContentLoaded", function(){

firebase.initializeApp({
apiKey:"AIzaSyBs3r8RFztg6NxUbkZmaSag2CxfF7phvG8",
authDomain:"sistema-asistencia-a47c9.firebaseapp.com",
projectId:"sistema-asistencia-a47c9"
});

const db=firebase.firestore();
const USER="Landia";
const PASS="Lapina1115";
let adminActivo=false;
let chart;
let datosTrimestre={Q1:{virtual:0,presencial:0},Q2:{virtual:0,presencial:0},Q3:{virtual:0,presencial:0},Q4:{virtual:0,presencial:0}};
const getFecha=()=>new Date().toISOString().split("T")[0];

window.guardar=function(){
const v=parseInt(virtual.value);
const p=parseInt(presencial.value);
if(isNaN(v)||isNaN(p)) return alert("Completa ambos campos");
db.collection("asistencia").doc(getFecha()).set({virtual:v,presencial:p}).then(()=>{virtual.value="";presencial.value="";mostrar();});
};

function mostrar(){
historial.innerHTML="";
datosTrimestre={Q1:{virtual:0,presencial:0},Q2:{virtual:0,presencial:0},Q3:{virtual:0,presencial:0},Q4:{virtual:0,presencial:0}};

db.collection("asistencia").get().then(snapshot=>{
const datos={};
snapshot.forEach(doc=>{
const fecha=doc.id;
const data=doc.data();
datos[fecha]=data;
const mes=parseInt(fecha.split("-")[1]);
const q=mes<=3?"Q1":mes<=6?"Q2":mes<=9?"Q3":"Q4";
datosTrimestre[q].virtual+=data.virtual;
datosTrimestre[q].presencial+=data.presencial;
});

Object.keys(datos).sort().reverse().forEach(fecha=>{
historial.innerHTML+=`
<div class="historial-item">
<strong>${fecha}</strong><br>
Virtual: ${datos[fecha].virtual} |
Presencial: ${datos[fecha].presencial}
${adminActivo?`<button class="danger" onclick="eliminar('${fecha}')">Eliminar</button>`:""}
</div>`;
});

if(adminActivo) actualizarGrafico();
});
}

window.eliminar=function(fecha){
if(!confirm("¿Eliminar "+fecha+"?")) return;
db.collection("asistencia").doc(fecha).delete().then(()=>mostrar());
};

window.actualizarGrafico=function(){
const t=selectorTrimestre.value;
const v=datosTrimestre[t].virtual;
const p=datosTrimestre[t].presencial;
const total=v+p;
const pv=total?((v/total)*100).toFixed(1):0;
const pp=total?((p/total)*100).toFixed(1):0;

if(chart) chart.destroy();

chart=new Chart(graficoPastel,{
type:"pie",
data:{
labels:["Virtual "+pv+"%","Presencial "+pp+"%"],
datasets:[{
data:[v,p],
backgroundColor:["#2563eb","#16a34a"],
borderWidth:2
}]
},
options:{
responsive:true,
animation:{duration:1500,easing:"easeOutQuart"},
plugins:{
legend:{position:"bottom"},
datalabels:{
color:"#fff",
formatter:(value)=> total?((value/total)*100).toFixed(1)+"%":"0%"
}
}
},
plugins:[ChartDataLabels]
});
};

window.mostrarLogin=function(){loginBox.style.display="block";};
window.login=function(){
if(usuario.value===USER && password.value===PASS){
adminPanel.style.display="block";
loginBox.style.display="none";
adminActivo=true;
mostrar();
}else alert("Credenciales incorrectas");
};

window.exportar=function(){
db.collection("asistencia").get().then(snapshot=>{
const datos={};
snapshot.forEach(doc=>datos[doc.id]=doc.data());
const blob=new Blob([JSON.stringify(datos,null,2)],{type:"text/plain"});
const a=document.createElement("a");
a.href=URL.createObjectURL(blob);
a.download="asistencia.txt";
a.click();
});
};

window.importar=function(e){
const archivo=e.target.files[0];
if(!archivo) return;
const reader=new FileReader();
reader.onload=()=>{
try{
const datos=JSON.parse(reader.result);
Object.keys(datos).forEach(fecha=>{
db.collection("asistencia").doc(fecha).set(datos[fecha]);
});
mostrar();
alert("Importado correctamente");
}catch{alert("Archivo inválido");}
};
reader.readAsText(archivo);
};

mostrar();
});
</script>

</body>
</html>
