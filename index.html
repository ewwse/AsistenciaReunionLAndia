<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Control de Asistencia</title>

<script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-firestore-compat.js"></script>
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<style>
:root{
--bg:#f4f6f9;
--card:#ffffff;
--text:#1e1e1e;
--accent:#4a90e2;
--danger:#ff4d4d;
}

body.dark{
--bg:#0f172a;
--card:#1e293b;
--text:#f1f5f9;
--accent:#3b82f6;
}

body{
margin:0;
font-family:system-ui;
background:var(--bg);
color:var(--text);
transition:background .4s ease,color .4s ease;
}

.container{
max-width:900px;
margin:40px auto;
padding:20px;
}

.card{
background:var(--card);
padding:20px;
border-radius:16px;
box-shadow:0 10px 30px rgba(0,0,0,.08);
margin-bottom:20px;
transition:.3s;
}

input{
padding:10px;
margin:5px 0;
width:100%;
border-radius:8px;
border:1px solid #ccc;
}

button{
padding:10px 15px;
border:none;
border-radius:8px;
cursor:pointer;
background:var(--accent);
color:white;
transition:.3s;
}

button:hover{
transform:scale(1.05);
}

.danger{
background:var(--danger);
}

.historial-item{
padding:10px;
margin:5px 0;
border-bottom:1px solid #ccc;
animation:fadeIn .4s ease;
}

@keyframes fadeIn{
from{opacity:0;transform:translateY(10px)}
to{opacity:1;transform:translateY(0)}
}

#modoBtn{
position:fixed;
top:15px;
right:15px;
width:45px;
height:45px;
border-radius:50%;
font-size:20px;
display:flex;
align-items:center;
justify-content:center;
box-shadow:0 4px 12px rgba(0,0,0,.2);
}

canvas{
margin-top:20px;
}

</style>
</head>
<body>

<button id="modoBtn" onclick="toggleModo()">🌙</button>

<div class="container">

<h1>Control de Asistencia</h1>

<div class="card">
<h3>Registrar Asistencia</h3>
<input type="number" id="virtual" placeholder="Cantidad Virtual">
<input type="number" id="presencial" placeholder="Cantidad Presencial">
<button onclick="guardar()">Guardar</button>
</div>

<div class="card">
<h3>Historial</h3>
<div id="historial"></div>
</div>

<div class="card" id="adminPanel" style="display:none">
<h3>Panel Admin</h3>
<canvas id="grafico"></canvas>
</div>

<div class="card" id="loginBox">
<h3>Login Admin</h3>
<input type="text" id="usuario" placeholder="Usuario">
<input type="password" id="password" placeholder="Contraseña">
<button onclick="login()">Entrar</button>
</div>

</div>

<script>
const firebaseConfig={
apiKey:"TU_API_KEY",
authDomain:"TU_AUTH_DOMAIN",
projectId:"TU_PROJECT_ID",
storageBucket:"TU_STORAGE_BUCKET",
messagingSenderId:"TU_SENDER_ID",
appId:"TU_APP_ID"
};

firebase.initializeApp(firebaseConfig);
const db=firebase.firestore();

const USER="Landia";
const PASS="Lapina1115";

let adminActivo=false;
let chart;
let datosTrimestre;

const getFecha=()=>new Date().toISOString().split("T")[0];

function guardar(){
const v=Number(document.getElementById("virtual").value);
const p=Number(document.getElementById("presencial").value);

if(isNaN(v)||isNaN(p)){
alert("Completa ambos campos");
return;
}

db.collection("asistencia").doc(getFecha()).set({virtual:v,presencial:p})
.then(()=>{
document.getElementById("virtual").value="";
document.getElementById("presencial").value="";
mostrar();
});
}

function mostrar(){
historial.innerHTML="";
datosTrimestre={Q1:{virtual:0,presencial:0},Q2:{virtual:0,presencial:0},Q3:{virtual:0,presencial:0},Q4:{virtual:0,presencial:0}};

db.collection("asistencia").get().then(snapshot=>{
const datos={};

snapshot.forEach(doc=>{
const fecha=doc.id;
const data=doc.data();
datos[fecha]=data;

const mes=parseInt(fecha.split("-")[1]);

if(mes<=3){datosTrimestre.Q1.virtual+=data.virtual;datosTrimestre.Q1.presencial+=data.presencial;}
else if(mes<=6){datosTrimestre.Q2.virtual+=data.virtual;datosTrimestre.Q2.presencial+=data.presencial;}
else if(mes<=9){datosTrimestre.Q3.virtual+=data.virtual;datosTrimestre.Q3.presencial+=data.presencial;}
else{datosTrimestre.Q4.virtual+=data.virtual;datosTrimestre.Q4.presencial+=data.presencial;}
});

Object.keys(datos).sort().reverse().forEach(fecha=>{
historial.innerHTML+=`
<div class="historial-item">
<strong>${fecha}</strong><br>
Virtual: ${datos[fecha].virtual} |
Presencial: ${datos[fecha].presencial}
${adminActivo?`<button class="danger" onclick="eliminar('${fecha}')">Eliminar</button>`:""}
</div>`;
});

if(adminActivo) actualizarGrafico();
});
}

function actualizarGrafico(){
const labels=Object.keys(datosTrimestre);
const virtual=labels.map(q=>datosTrimestre[q].virtual);
const presencial=labels.map(q=>datosTrimestre[q].presencial);

if(chart) chart.destroy();

chart=new Chart(document.getElementById("grafico"),{
type:"bar",
data:{
labels,
datasets:[
{
label:"Virtual",
data:virtual,
borderRadius:8
},
{
label:"Presencial",
data:presencial,
borderRadius:8
}
]
},
options:{
responsive:true,
plugins:{
tooltip:{
callbacks:{
label:function(context){
const total=context.dataset.data.reduce((a,b)=>a+b,0);
const value=context.raw;
const percent=((value/total)*100).toFixed(1);
return context.dataset.label+": "+value+" ("+percent+"%)";
}
}
}
},
animation:{
duration:1000,
easing:"easeOutQuart"
},
scales:{
y:{beginAtZero:true}
}
}
});
}

function login(){
const user=document.getElementById("usuario").value;
const pass=document.getElementById("password").value;

if(user===USER && pass===PASS){
document.getElementById("adminPanel").style.display="block";
document.getElementById("loginBox").style.display="none";
adminActivo=true;
mostrar();
}else{
alert("Credenciales incorrectas");
}
}

function eliminar(fecha){
if(!confirm("¿Eliminar registro "+fecha+"?")) return;
db.collection("asistencia").doc(fecha).delete().then(()=>mostrar());
}

function toggleModo(){
document.body.classList.toggle("dark");
const btn=document.getElementById("modoBtn");

if(document.body.classList.contains("dark")){
btn.textContent="☀️";
localStorage.setItem("modo","dark");
}else{
btn.textContent="🌙";
localStorage.setItem("modo","light");
}
}

if(localStorage.getItem("modo")==="dark"){
document.body.classList.add("dark");
document.getElementById("modoBtn").textContent="☀️";
}

mostrar();
</script>

</body>
</html>
